# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-marialinux"
BBFILE_PATTERN_meta-marialinux = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-marialinux = "6"

LAYERDEPENDS_meta-marialinux = "core"
LAYERSERIES_COMPAT_meta-marialinux = "scarthgap"
